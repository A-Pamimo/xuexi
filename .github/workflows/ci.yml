name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      # Install a real Chromium for playwright-core (the repo depends on
      # playwright-core, which has no browser download of its own).
      - name: Install Chromium
        run: npx --yes playwright@1.61.1 install --with-deps chromium

      - name: Build web export
        run: npm run export:web

      - name: Web smoke test
        run: |
          PW_EXECUTABLE_PATH="$(node -e "console.log(require('playwright-core').chromium.executablePath())")"
          export PW_EXECUTABLE_PATH
          echo "Using Chromium at: $PW_EXECUTABLE_PATH"
          node scripts/smoke-web.mjs

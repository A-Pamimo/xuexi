# Deploys the web export to the gh-pages branch on every push to main, gated on
# the same checks as CI (typecheck, tests, smoke). This replaces the manual
# "Deploy:" commits: the deployed site can no longer diverge from CI-green main,
# and the Firebase web config comes from repository secrets instead of a local
# .env.local. (The EXPO_PUBLIC_FIREBASE_* values are not secrets in the
# cryptographic sense — a Firebase web config is public by design and ends up in
# the bundle regardless; Firestore security rules are the access gate. Storing
# them as Actions secrets just keeps a single source of truth for deploys.)
name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write # push to gh-pages

concurrency:
  group: deploy-gh-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Build web export
        run: npm run export:web
        env:
          EXPO_PUBLIC_FIREBASE_API_KEY: ${{ secrets.EXPO_PUBLIC_FIREBASE_API_KEY }}
          EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          EXPO_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_PROJECT_ID }}
          EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          EXPO_PUBLIC_FIREBASE_APP_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_APP_ID }}

      - name: Install Chromium
        run: npx --yes playwright@1.61.1 install --with-deps chromium

      - name: Web smoke test (the build that ships)
        run: |
          PW_EXECUTABLE_PATH="$(node -e "console.log(require('playwright-core').chromium.executablePath())")"
          export PW_EXECUTABLE_PATH
          node scripts/smoke-web.mjs

      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          commit_message: 'Deploy: ${{ github.event.head_commit.message || github.sha }}'
